<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Tarefas</title>
    <link rel="stylesheet" href="../css/style.css">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <video autoplay muted loop id="bg-video">
        <source src="../img/kling-3.0_Two_colorful_smoke_clouds_colliding_in_mid-air_creating_a_beautiful_and_dynamic_-0.mp4" type="video/mp4">
    </video>

    <div class="overlay"></div>

    <h1>Lista de Tarefas</h1>

    <button id="botaocalendario" type="button" onclick="loginEConectarCalendar()">
        Entrar com Google + Calendar
    </button>

    <div id="usuario"></div>

    <header>
        <input id="input" type="text" placeholder="Adicionar tarefa">
        <button id="btnadd" onclick="addTarefa()">Adicionar</button>

        <div id="controletempo">
            <label for="data">📅</label>
            <input type="date" id="data">

            <label for="inicio">⏱️ Início</label>
            <input type="time" id="inicio">

            <label for="fim">⏱️ Fim</label>
            <input type="time" id="fim">
        </div>
    </header>

    <section id="lote-tarefas">
        <h2>Adicionar várias tarefas</h2>
        <h3>Uma por linha no formato: Título | AAAA-MM-DD | HH:MM | HH:MM</h3>

        <textarea id="tarefas-lote" rows="8" cols="80" placeholder="Estudar JS | 2026-03-22 | 09:00 | 10:30&#10;Reunião | 2026-03-22 | 11:00 | 12:00"></textarea>

        <br>
        <button type="button" onclick="adicionarVariasTarefas()" class="botaovarias">Adicionar várias na lista</button>
        <button type="button" onclick="enviarTodasParaCalendar()" class="botaovarias">Enviar tudo pro Calendar</button>
    </section>

    <h1 id="tarefinha"></h1>
    <main id="area"></main>

    <script src="../js/controle.js"></script>
    <script src="../js/googleapi.js"></script>

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js"></script>
</body>
</html>
